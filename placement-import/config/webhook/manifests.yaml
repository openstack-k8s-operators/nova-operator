---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-placement-openstack-org-v1beta1-placementapi
  failurePolicy: Fail
  name: mplacementapi-v1beta1.kb.io
  rules:
  - apiGroups:
    - placement.openstack.org
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - placementapis
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-placement-openstack-org-v1beta1-placementapi
  failurePolicy: Fail
  name: vplacementapi-v1beta1.kb.io
  rules:
  - apiGroups:
    - placement.openstack.org
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - placementapis
  sideEffects: None
