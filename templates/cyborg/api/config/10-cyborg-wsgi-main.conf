{{ if (index . "VHosts") }}
{{ range $endpt, $vhost := .VHosts }}
# {{ $endpt }} vhost {{ $vhost.ServerName }} configuration
<VirtualHost *:{{ $vhost.Port }}>
  ServerName {{ $vhost.ServerName }}

  ## Vhost docroot
  DocumentRoot "/var/www/cgi-bin"

  # Set the timeout for the cyborg-api
  TimeOut {{ $vhost.TimeOut }}

  ## Directories, there should at least be a declaration for /var/www/cgi-bin
  <Directory "/var/www/cgi-bin">
    Options -Indexes +FollowSymLinks +MultiViews
    AllowOverride None
    Require all granted
  </Directory>

  ## Logging
  ErrorLog /dev/stdout
  ServerSignature Off
  CustomLog /dev/stdout combined env=!forwarded
  CustomLog /dev/stdout proxy env=forwarded
  LogLevel info

{{- if $vhost.TLS }}
  SetEnvIf X-Forwarded-Proto https HTTPS=1

  ## SSL directives
  SSLEngine on
  SSLCertificateFile      "{{ $vhost.SSLCertificateFile }}"
  SSLCertificateKeyFile   "{{ $vhost.SSLCertificateKeyFile }}"
{{- end }}

  ## WSGI configuration
  WSGIApplicationGroup %{GLOBAL}
  WSGIDaemonProcess {{ $endpt }} display-name={{ $endpt }} group=cyborg processes=2 threads=1 user=cyborg
  WSGIProcessGroup {{ $endpt }}
  WSGIScriptAlias / "/var/lib/kolla/venv/lib/python3.12/site-packages/cyborg/wsgi/api.py"
</VirtualHost>
{{ end }}
{{ end }}
