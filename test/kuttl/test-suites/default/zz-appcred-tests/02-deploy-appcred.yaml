apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -euo pipefail
      NS="${NAMESPACE}"

      # Capture a pod UID before appcred is created; used to verify restart later.
      old_uid=$(oc get pod -n "${NS}" nova-kuttl-cell1-conductor-0 -o jsonpath='{.metadata.uid}')
      oc create configmap appcred-nova-pre \
        --from-literal=cell1_conductor_uid="${old_uid}" \
        --dry-run=client -o yaml | oc apply -n "${NS}" -f -

      cat <<'EOF' | oc apply -n "${NS}" -f -
      apiVersion: keystone.openstack.org/v1beta1
      kind: KeystoneApplicationCredential
      metadata:
        name: ac-nova
      spec:
        secret: osp-secret
        passwordSelector: NovaPassword
        userName: nova
        roles:
          - admin
          - service
        unrestricted: false
      EOF

      echo "Waiting for KeystoneApplicationCredential ac-nova to be Ready..."
      oc wait -n "${NS}" appcred/ac-nova --for=condition=Ready --timeout=300s

      ac_secret_name=$(oc get -n "${NS}" appcred/ac-nova -o jsonpath='{.status.secretName}')
      if [ -z "${ac_secret_name}" ]; then
        echo "ERROR: appcred/ac-nova.status.secretName is empty"
        exit 1
      fi
      echo "AC secret name: ${ac_secret_name}"

      oc patch nova nova-kuttl -n "${NS}" --type=merge -p "{\"spec\":{\"auth\":{\"applicationCredentialSecret\":\"${ac_secret_name}\"}}}"
